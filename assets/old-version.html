<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旧版 MA 后台首页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.top-bar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.back-btn { padding: 8px 20px; background: #6b7280; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
.back-btn:hover { background: #4b5563; }
.img-container { margin-top: 60px; padding: 20px; cursor: pointer; }
.img-container img { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="goBack()">← 返回新版 Demo</button>
</div>
<div class="img-container" onclick="goBack()">
  <img src="ma首页.png" alt="旧版 MA 后台首页">
</div>
<script>
function goBack() {
  var returnUrl = new URLSearchParams(window.location.search).get('return');
  if (returnUrl) {
    window.location.href = returnUrl;
  } else {
    window.location.href = '../MA首页升级Demo-对比优化版.html';
  }
}
</script>
</body>
</html>
