<svg xmlns="http://www.w3.org/2000/svg" width="480" height="860" viewBox="0 0 480 860">
  <defs>
    <filter id="shadow" x="-5%" y="-1%" width="110%" height="102%">
      <feDropShadow dx="-3" dy="0" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="860" fill="#fff" rx="0" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="0" y="0" width="480" height="52" fill="#fff"/>
  <line x1="0" y1="52" x2="480" y2="52" stroke="#ebebeb" stroke-width="1"/>
  <text x="18" y="32" font-size="15" font-weight="700" fill="#1a1a1a" font-family="PingFang SC, sans-serif">营销助手 Noah</text>
  <circle cx="230" cy="28" r="4" fill="#4e6ef2"/>
  <text x="238" y="32" font-size="11" fill="#4e6ef2" font-weight="600" font-family="PingFang SC, sans-serif">3个计划全站...</text>
  <text x="380" y="32" font-size="12" fill="#4e6ef2" font-family="PingFang SC, sans-serif">任务管理</text>
  <text x="452" y="32" font-size="18" fill="#999" font-family="sans-serif">×</text>

  <!-- Task Cards Area -->
  <rect x="0" y="52" width="480" height="90" fill="#fff"/>
  <line x1="0" y1="142" x2="480" y2="142" stroke="#f0f0f0" stroke-width="1"/>
  <text x="24" y="74" font-size="12" fill="#666" font-family="PingFang SC, sans-serif">✦ 您可以安排我做的任务</text>
  <text x="440" y="74" font-size="12" fill="#bbb" font-family="sans-serif">→</text>

  <!-- Card 1: P4P诊断 -->
  <rect x="18" y="84" width="140" height="50" rx="8" fill="#f8f9fa" stroke="#e8e8e8" stroke-width="1"/>
  <text x="88" y="104" text-anchor="middle" font-size="14" font-family="sans-serif">📊</text>
  <text x="88" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#333" font-family="PingFang SC, sans-serif">P4P诊断</text>

  <!-- Card 2: 计划诊断 -->
  <rect x="168" y="84" width="140" height="50" rx="8" fill="#eef1fe" stroke="#c7d2fe" stroke-width="1"/>
  <text x="238" y="104" text-anchor="middle" font-size="14" font-family="sans-serif">📋</text>
  <text x="238" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#333" font-family="PingFang SC, sans-serif">计划诊断</text>

  <!-- Card 3: 智投管理 -->
  <rect x="318" y="84" width="140" height="50" rx="8" fill="#f8f9fa" stroke="#e8e8e8" stroke-width="1"/>
  <text x="388" y="104" text-anchor="middle" font-size="14" font-family="sans-serif">🎯</text>
  <text x="388" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#333" font-family="PingFang SC, sans-serif">智投管理</text>

  <!-- Chat Area -->
  <!-- User msg 1 -->
  <rect x="160" y="162" width="296" height="44" rx="14" fill="#f5f5f5"/>
  <text x="172" y="182" font-size="13" fill="#1a1a1a" font-family="PingFang SC, sans-serif">推广计划的预算花不出去，</text>
  <text x="172" y="198" font-size="13" fill="#1a1a1a" font-family="PingFang SC, sans-serif">帮忙查看具体问题？</text>
  <!-- User avatar -->
  <circle cx="466" cy="178" r="14" fill="#e8e8e8"/>
  <text x="466" y="183" text-anchor="middle" font-size="10" fill="#666" font-family="PingFang SC, sans-serif">亦</text>

  <!-- AI msg 1 -->
  <circle cx="30" cy="236" r="14" fill="#4e6ef2"/>
  <text x="30" y="240" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="sans-serif">AI</text>
  <text x="52" y="234" font-size="11" fill="#999" font-family="PingFang SC, sans-serif">结果生成</text>
  <text x="52" y="254" font-size="13" fill="#333" font-family="PingFang SC, sans-serif">为了更好地进行计划诊断分析，</text>
  <text x="52" y="272" font-size="13" fill="#333" font-family="PingFang SC, sans-serif">请选择需要诊断的计划：</text>

  <!-- Plan selection card -->
  <rect x="52" y="284" width="380" height="38" rx="8" fill="#fafbff" stroke="#4e6ef2" stroke-width="1.5"/>
  <text x="66" y="308" font-size="12" fill="#333" font-family="PingFang SC, sans-serif">全站推广_推商品_新品加速_20260...</text>
  <text x="410" y="308" font-size="14" fill="#10b981" font-family="sans-serif">✓</text>

  <!-- Thumbs -->
  <text x="52" y="340" font-size="14" fill="#bbb" font-family="sans-serif">👍</text>
  <text x="78" y="340" font-size="14" fill="#bbb" font-family="sans-serif">👎</text>

  <!-- User msg 2 -->
  <rect x="110" y="360" width="346" height="44" rx="14" fill="#f5f5f5"/>
  <text x="122" y="380" font-size="13" fill="#1a1a1a" font-family="PingFang SC, sans-serif">P4P出价提升到¥1.8，优先投放搜索</text>
  <text x="122" y="396" font-size="13" fill="#1a1a1a" font-family="PingFang SC, sans-serif">曝光不足的高潜品</text>
  <circle cx="466" cy="376" r="14" fill="#e8e8e8"/>
  <text x="466" y="381" text-anchor="middle" font-size="10" fill="#666" font-family="PingFang SC, sans-serif">亦</text>

  <!-- AI msg 2 -->
  <circle cx="30" cy="434" r="14" fill="#4e6ef2"/>
  <text x="30" y="438" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="sans-serif">AI</text>
  <text x="52" y="432" font-size="11" fill="#999" font-family="PingFang SC, sans-serif">结果生成</text>
  <text x="52" y="452" font-size="13" fill="#333" font-family="PingFang SC, sans-serif">已完成P4P出价调整方案，以下3个商品将提升出价：</text>

  <!-- Product card 1 -->
  <rect x="52" y="466" width="400" height="46" rx="8" fill="#f5f7ff" stroke="#dde3fc" stroke-width="1"/>
  <text x="66" y="484" font-size="12" font-weight="600" fill="#333" font-family="PingFang SC, sans-serif">Pet Bed Dog Sofa Cushion</text>
  <text x="380" y="484" font-size="12" font-weight="700" fill="#4e6ef2" font-family="PingFang SC, sans-serif">¥0.9→¥1.8</text>
  <text x="66" y="502" font-size="11" fill="#7b93f7" font-family="PingFang SC, sans-serif">预估日曝光 +320%</text>

  <!-- Product card 2 -->
  <rect x="52" y="520" width="400" height="46" rx="8" fill="#f5f7ff" stroke="#dde3fc" stroke-width="1"/>
  <text x="66" y="538" font-size="12" font-weight="600" fill="#333" font-family="PingFang SC, sans-serif">Universal Pet Eye Mask</text>
  <text x="380" y="538" font-size="12" font-weight="700" fill="#4e6ef2" font-family="PingFang SC, sans-serif">¥0.9→¥1.6</text>
  <text x="66" y="556" font-size="11" fill="#7b93f7" font-family="PingFang SC, sans-serif">预估日曝光 +280%</text>

  <!-- Product card 3 -->
  <rect x="52" y="574" width="400" height="46" rx="8" fill="#f5f7ff" stroke="#dde3fc" stroke-width="1"/>
  <text x="66" y="592" font-size="12" font-weight="600" fill="#333" font-family="PingFang SC, sans-serif">Multi-color Pet Leash</text>
  <text x="380" y="592" font-size="12" font-weight="700" fill="#4e6ef2" font-family="PingFang SC, sans-serif">¥0.9→¥1.5</text>
  <text x="66" y="610" font-size="11" fill="#7b93f7" font-family="PingFang SC, sans-serif">预估日曝光 +240%</text>

  <!-- Expected Results -->
  <rect x="52" y="632" width="400" height="50" rx="8" fill="#eef1fe" stroke="#c7d2fe" stroke-width="1"/>
  <text x="66" y="652" font-size="12" font-weight="600" fill="#3b5bdb" font-family="PingFang SC, sans-serif">📈 预期效果</text>
  <text x="66" y="672" font-size="11" fill="#666" font-family="PingFang SC, sans-serif">日均消耗 ¥50→¥150-180 · 搜索曝光 +200% · 新增询盘 5-8个/周</text>

  <!-- Action Buttons -->
  <rect x="52" y="696" width="100" height="36" rx="8" fill="#4e6ef2"/>
  <text x="102" y="718" text-anchor="middle" font-size="13" font-weight="600" fill="#fff" font-family="PingFang SC, sans-serif">确认执行</text>

  <rect x="162" y="696" width="100" height="36" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="212" y="718" text-anchor="middle" font-size="13" fill="#666" font-family="PingFang SC, sans-serif">修改方案</text>

  <!-- Thumbs row 2 -->
  <text x="52" y="756" font-size="14" fill="#bbb" font-family="sans-serif">👍</text>
  <text x="78" y="756" font-size="14" fill="#bbb" font-family="sans-serif">👎</text>

  <!-- Input Area -->
  <line x1="0" y1="778" x2="480" y2="778" stroke="#ebebeb" stroke-width="1"/>
  <rect x="18" y="792" width="444" height="42" rx="10" fill="#fff" stroke="#4e6ef2" stroke-width="1.5"/>

  <!-- Toggle -->
  <rect x="28" y="802" width="28" height="16" rx="8" fill="#e8e8e8"/>
  <circle cx="48" cy="810" r="6" fill="#4e6ef2"/>
  <text x="62" y="815" font-size="11" fill="#666" font-family="PingFang SC, sans-serif">深度思考</text>

  <!-- Input placeholder -->
  <text x="140" y="818" font-size="13" fill="#bbb" font-family="PingFang SC, sans-serif">提出任何问题...</text>

  <!-- Plus and Send -->
  <text x="416" y="818" font-size="16" fill="#bbb" font-family="sans-serif">＋</text>
  <circle cx="446" cy="813" r="14" fill="#4e6ef2"/>
  <text x="446" y="818" text-anchor="middle" font-size="14" fill="#fff" font-family="sans-serif">↑</text>

  <!-- Footer text -->
  <text x="240" y="852" text-anchor="middle" font-size="10" fill="#bbb" font-family="PingFang SC, sans-serif">以上回答由AI生成</text>
</svg>
